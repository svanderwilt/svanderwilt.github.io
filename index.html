<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pai Gow Flash</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            text-align: center;
            padding: 40px 24px;
        }
        h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 12px;
        }
        .tagline {
            font-size: 1.1rem;
            color: #a0a0b8;
            margin-bottom: 32px;
        }
        .description {
            font-size: 1rem;
            line-height: 1.6;
            color: #c0c0d0;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .links a {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            width: 250px;
        }
        .app-store {
            background: #0071e3;
            color: #fff;
        }
        .app-store:hover { background: #0063cc; }
        .privacy {
            background: transparent;
            color: #a0a0b8;
            border: 1px solid #a0a0b8;
        }
        .privacy:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pai Gow Flash</h1>
        <p class="tagline">Master the ancient game of Pai Gow Tiles</p>
        <p class="description">
            Learn to set hands the house way, test your speed, and challenge friends.
            Whether you're a beginner or a seasoned player, sharpen your Pai Gow skills on the go.
        </p>
        <div class="links">
            <a href="https://apps.apple.com/us/app/pai-gow-flash/id6758215114" class="app-store">Download on the App Store</a>
            <a href="https://gist.github.com/svanderwilt/7316159fe7317ec00d70fd2553679f12" class="privacy">Privacy Policy</a>
        </div>
    </div>
</body>
</html>
